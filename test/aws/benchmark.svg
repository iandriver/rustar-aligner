<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Solo align and count wall time: STARsolo 78s, rustar 120s, CellRanger 344s</title>
  <desc id="d">Median wall time over 3 warm reps with indexes on local NVMe. STARsolo 78 seconds (78-87), rustar 120 seconds (119-121), CellRanger 344 seconds (340-347). All stable. Max RSS: STARsolo 27 GB, rustar 26 GB, CellRanger 12 GB.</desc>
  <style>
    .ttl{font-size:18px;font-weight:500;fill:#1a1a19}
    .sub{font-size:12px;fill:#6b6a64}
    .lbl{font-size:13px;fill:#3a3a37}
    .lblh{font-size:13px;font-weight:500;fill:#1f5fa8}
    .val{font-size:13px;font-weight:500;fill:#1a1a19}
    .ax{font-size:11px;fill:#898781}
    .cap{font-size:11.5px;fill:#6b6a64}
    .grid{stroke:#e1e0d9}
    .whisk{stroke:#5f5e5a;stroke-width:1.5}
    @media (prefers-color-scheme:dark){
      .ttl{fill:#ededea}.sub{fill:#a8a79f}.lbl{fill:#cfcec6}.val{fill:#ededea}
      .cap{fill:#a8a79f}.lblh{fill:#5ea0ec}.grid{stroke:#33332f}.whisk{stroke:#a8a79f}
    }
  </style>
  <text x="20" y="28" class="ttl">Single-cell align + count — wall time (lower is better)</text>
  <text x="20" y="48" class="sub">mouse 5k-PBMC · 10M reads · native x86_64 (m6id.4xlarge, 10 threads, local NVMe) · Gene/GeneFull/SJ/Velocyto + EmptyDrops · warm</text>
  <line class="grid" x1="276.7" y1="68" x2="276.7" y2="212"/>
  <line class="grid" x1="393.3" y1="68" x2="393.3" y2="212"/>
  <line class="grid" x1="510"   y1="68" x2="510"   y2="212"/>
  <line class="grid" x1="626.7" y1="68" x2="626.7" y2="212"/>
  <line stroke="#c3c2b7" x1="160" y1="212" x2="720" y2="212"/>
  <text x="160"   y="228" class="ax" text-anchor="middle">0</text>
  <text x="276.7" y="228" class="ax" text-anchor="middle">100s</text>
  <text x="393.3" y="228" class="ax" text-anchor="middle">200s</text>
  <text x="510"   y="228" class="ax" text-anchor="middle">300s</text>
  <text x="626.7" y="228" class="ax" text-anchor="middle">400s</text>
  <text x="152" y="96"  class="lbl" text-anchor="end">STARsolo</text>
  <rect x="160" y="78" width="91" height="28" rx="3" fill="#b4b2a9"/>
  <line class="whisk" x1="251" y1="92" x2="261.5" y2="92"/>
  <line class="whisk" x1="251" y1="88" x2="251" y2="96"/>
  <line class="whisk" x1="261.5" y1="88" x2="261.5" y2="96"/>
  <text x="272" y="96" class="val">78 s</text>
  <text x="152" y="146" class="lblh" text-anchor="end">rustar</text>
  <rect x="160" y="128" width="140" height="28" rx="3" fill="#2a78d6"/>
  <line class="whisk" x1="298.8" y1="142" x2="301.2" y2="142"/>
  <line class="whisk" x1="298.8" y1="138" x2="298.8" y2="146"/>
  <line class="whisk" x1="301.2" y1="138" x2="301.2" y2="146"/>
  <text x="312" y="146" class="val">120 s</text>
  <text x="152" y="196" class="lbl" text-anchor="end">CellRanger</text>
  <rect x="160" y="178" width="401" height="28" rx="3" fill="#b4b2a9"/>
  <line class="whisk" x1="556.7" y1="192" x2="564.9" y2="192"/>
  <line class="whisk" x1="556.7" y1="188" x2="556.7" y2="196"/>
  <line class="whisk" x1="564.9" y1="188" x2="564.9" y2="196"/>
  <text x="573" y="196" class="val">344 s</text>
  <text x="20" y="258" class="cap">bar = median of 3 warm reps · whisker = min–max · indexes on local NVMe (no gp3 EBS variance). All three stable.</text>
  <text x="20" y="276" class="cap">STARsolo's hand-tuned aligner leads on raw compute; rustar is ~1.5× behind but ~2.9× faster than CellRanger. Max RSS: rustar 26 GB (~2 GB live + ~24 GB reclaimable index) · STARsolo 27 GB · CellRanger 12 GB.</text>
</svg>
